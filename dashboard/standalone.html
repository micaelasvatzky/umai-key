<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditor - Dashboard Seguridad</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Mock data
    const MOCK_DATA = [
      { id: 1, timestamp: '09:30', nombre: 'Maria Gonzalez', email: 'mgonzalez@maimonides.edu.ar', motivo: 'Dictado de clase', area: 'Laboratorio Quimica', mailAuditor: 'auditor.quimica@maimonides.edu.ar', numeroAula: '101', estado: 'retirada' },
      { id: 2, timestamp: '10:15', nombre: 'Carlos Perez', email: 'cperez@maimonides.edu.ar', motivo: 'Evaluacion', area: 'Laboratorio Fisica', mailAuditor: 'auditor.fisica@maimonides.edu.ar', numeroAula: '203', estado: 'retirada' },
      { id: 3, timestamp: '11:00', nombre: 'Lucas Martinez', email: 'lmartinez@maimonides.edu.ar', motivo: 'Clase practica', area: 'Laboratorio Computacion', mailAuditor: 'auditor.computacion@maimonides.edu.ar', numeroAula: '305', estado: 'devuelta' },
      { id: 4, timestamp: '11:30', nombre: 'Jose Herrera', email: 'jherrera@maimonides.edu.ar', motivo: 'Reparacion', area: 'Laboratorio Computacion', mailAuditor: 'auditor.computacion@maimonides.edu.ar', numeroAula: '102', estado: 'retirada' },
    ];

    function App() {
      const [registros, setRegistros] = useState([]);
      const [historial, setHistorial] = useState([]);
      const [darkMode, setDarkMode] = useState(false);

      useEffect(() => {
        const savedDark = localStorage.getItem('darkMode') === 'true';
        setDarkMode(savedDark);
        if (savedDark) document.documentElement.classList.add('dark');
        setRegistros(MOCK_DATA.filter(r => r.estado === 'retirada'));
        setHistorial(MOCK_DATA.filter(r => r.estado === 'devuelta'));
      }, []);

      const toggleDarkMode = () => {
        const newMode = !darkMode;
        setDarkMode(newMode);
        localStorage.setItem('darkMode', String(newMode));
        document.documentElement.classList.toggle('dark', newMode);
      };

      const devolver = (id) => {
        const registro = registros.find(r => r.id === id);
        if (!registro) return;
        if (!confirm(`Confirmar devolucion del aula ${registro.numeroAula} por ${registro.nombre}?`)) return;
        const actualizado = { ...registro, estado: 'devuelta' };
        setRegistros(prev => prev.filter(r => r.id !== id));
        setHistorial(prev => [...prev, actualizado]);
      };

      const dark = darkMode;

      return (
        <div className="min-h-screen">
          {/* Header - Negro con Auditor en rojo */}
          <header className="bg-black text-white px-6 py-3 flex justify-between items-center">
            <h1 className="text-xl font-semibold">
              <span className="text-red-500">Auditor</span>
            </h1>
            <div className="flex items-center gap-4">
              <span className="text-sm opacity-90">Seguridad</span>
              <button onClick={toggleDarkMode} className="text-lg hover:opacity-80">
                {darkMode ? 'Sol' : 'Luna'}
              </button>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-6 py-6">
            {/* Stats */}
            <div className="flex justify-between items-center mb-6">
              <div className="flex gap-8">
                <div>
                  <div className="text-xs text-gray-500 dark:text-gray-400 uppercase">Retiradas</div>
                  <div className="text-2xl font-bold text-red-600">{registros.length}</div>
                </div>
                <div>
                  <div className="text-xs text-gray-500 dark:text-gray-400 uppercase">Historial Hoy</div>
                  <div className="text-2xl font-bold text-green-600">{historial.length}</div>
                </div>
              </div>
              <button className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-medium">
                Actualizar
              </button>
            </div>

            {/* Dos tablas lado a lado */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {/* Tabla: Llaves Retiradas */}
              <div className="bg-white dark:bg-gray-800 border dark:border-gray-700 rounded overflow-hidden">
                <div className="bg-gray-50 dark:bg-gray-700 px-4 py-3 border-b dark:border-gray-600 font-semibold dark:text-white">
                  Llaves Retiradas
                </div>
                <div className="overflow-x-auto max-h-96">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-100 dark:bg-gray-700 sticky top-0">
                      <tr>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Aula</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Area</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Nombre</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Motivo</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Auditor</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Accion</th>
                      </tr>
                    </thead>
                    <tbody>
                      {registros.length === 0 ? (
                        <tr><td colSpan={6} className="px-4 py-8 text-center text-gray-500 dark:text-gray-400">No hay llaves retiradas</td></tr>
                      ) : (
                        registros.sort((a, b) => a.numeroAula.localeCompare(b.numeroAula)).map((reg, idx) => (
                          <tr key={reg.id} className={idx % 2 === 0 ? (dark ? 'bg-gray-800' : 'bg-white') : (dark ? 'bg-gray-750' : 'bg-gray-50')}>
                            <td className="px-3 py-2 font-medium">{reg.numeroAula}</td>
                            <td className="px-3 py-2 text-gray-600 dark:text-gray-400">{reg.area}</td>
                            <td className="px-3 py-2">{reg.nombre}</td>
                            <td className="px-3 py-2 text-gray-600 dark:text-gray-400">{reg.motivo}</td>
                            <td className="px-3 py-2 text-gray-500 dark:text-gray-400 text-xs">{reg.mailAuditor}</td>
                            <td className="px-3 py-2">
                              <button onClick={() => devolver(reg.id)} className="bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-xs font-medium">
                                Devolver
                              </button>
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Tabla: Historial */}
              <div className="bg-white dark:bg-gray-800 border dark:border-gray-700 rounded overflow-hidden">
                <div className="bg-gray-50 dark:bg-gray-700 px-4 py-3 border-b dark:border-gray-600 font-semibold dark:text-white">
                  Historial del Dia
                </div>
                <div className="overflow-x-auto max-h-96">
                  <table className="w-full text-sm">
                    <thead className="bg-gray-100 dark:bg-gray-700 sticky top-0">
                      <tr>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Hora</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Aula</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Area</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Nombre</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Motivo</th>
                        <th className="text-left px-3 py-2 font-semibold text-gray-600 dark:text-gray-300 uppercase text-xs">Estado</th>
                      </tr>
                    </thead>
                    <tbody>
                      {historial.length === 0 ? (
                        <tr><td colSpan={6} className="px-4 py-8 text-center text-gray-500 dark:text-gray-400">No hay historial hoy</td></tr>
                      ) : (
                        historial.sort((a, b) => a.numeroAula.localeCompare(b.numeroAula)).map((reg, idx) => (
                          <tr key={reg.id} className={idx % 2 === 0 ? (dark ? 'bg-gray-800' : 'bg-white') : (dark ? 'bg-gray-750' : 'bg-gray-50')}>
                            <td className="px-3 py-2 text-gray-500 dark:text-gray-400">{reg.timestamp}</td>
                            <td className="px-3 py-2 font-medium">{reg.numeroAula}</td>
                            <td className="px-3 py-2 text-gray-600 dark:text-gray-400">{reg.area}</td>
                            <td className="px-3 py-2">{reg.nombre}</td>
                            <td className="px-3 py-2 text-gray-600 dark:text-gray-400">{reg.motivo}</td>
                            <td className="px-3 py-2">
                              <span className="px-2 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300">Devuelta</span>
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <footer className="mt-6 py-4 text-center text-gray-400 dark:text-gray-500 text-xs">
              Universidad Maimonides - Sistema de Prestamo de Llaves
            </footer>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
